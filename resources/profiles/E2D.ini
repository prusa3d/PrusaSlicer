# i3Al #

[print:*i3Al*]
fill_density = 40%
fill_pattern = gyroid
single_extruder_multi_material_priming = 0
travel_speed = 180

# 層高的打印參數。
[print:*0.10mm*]
inherits = *common*
bottom_solid_layers = 6
bridge_flow_ratio = 0.7
layer_height = 0.1
perimeter_acceleration = 800
top_solid_layers = 5


[print:*0.20mm*]
inherits = *common*
